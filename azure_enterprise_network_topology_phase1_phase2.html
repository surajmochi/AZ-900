<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:var(--font-sans,"Segoe UI",Arial,sans-serif);color:var(--color-text-primary,#1b1b1b)}
.wrap{width:100%;overflow-x:auto;padding:8px 0}
svg{display:block;width:100%;max-width:1100px;margin:0 auto}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;padding:8px 12px;font-size:11px;color:var(--color-text-secondary)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Tooltip */
#tip{position:fixed;pointer-events:none;z-index:9999;opacity:0;transition:opacity .15s;
  background:var(--color-background-primary,#fff);
  border:1px solid var(--color-border-secondary,rgba(0,0,0,.2));
  border-radius:8px;padding:10px 13px;font-size:12px;max-width:260px;
  box-shadow:0 4px 16px rgba(0,0,0,.12);line-height:1.5}
#tip .tip-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
#tip .tip-row{display:flex;justify-content:space-between;gap:12px;color:var(--color-text-secondary)}
#tip .tip-val{font-family:var(--font-mono,"Courier New");font-size:11px;color:var(--color-text-primary)}
</style>
</head>
